name: Build iOS Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install Theos Dependencies
      run: |
        brew install ldid xz

    - name: Install Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: Install iOS SDK
      run: |
        export THEOS=~/theos
        cd $THEOS/sdks
        curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1

    - name: Clean Build Cache
      run: |
        export THEOS=~/theos
        make clean || true
        rm -rf .theos/ || true

    - name: Fetch DarkSword sources (if fetch_darksword.sh exists)
      run: |
        if [ -f ./fetch_darksword.sh ]; then
          echo "===== 检测到 fetch_darksword.sh，拉取 DarkSword 源码 ====="
          chmod +x ./fetch_darksword.sh
          bash ./fetch_darksword.sh || {
            echo "⚠ DarkSword 拉取失败，Makefile 会自动降级 MR_WITH_DARKSWORD=0"
          }
        else
          echo "未找到 fetch_darksword.sh，跳过"
        fi

    - name: Build IPA
      run: |
        export THEOS=~/theos
        echo "===== 开始编译 (application) ====="
        make package FINALPACKAGE=1 2>&1 || {
          echo "===== 编译失败，显示错误信息 ====="
          cat *.log 2>/dev/null || true
          exit 1
        }
        echo "===== 编译完成，检查产物 ====="
        ls -la packages/ 2>/dev/null || echo "packages 目录不存在"
        find packages/ -name "*.ipa" 2>/dev/null || echo "未找到 .ipa 文件"

    - name: Pack IPA
      run: |
        export THEOS=~/theos
        echo "===== 打包 IPA ====="
        mkdir -p packages
        APP_PATH=$(find .theos/_/Applications -maxdepth 1 -type d -name "*.app" | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "❌ 未找到 .app 构建产物，列出 .theos 目录："
          find .theos -maxdepth 4 -type d 2>/dev/null || true
          exit 1
        fi
        echo "✓ 找到 App: $APP_PATH"
        rm -rf Payload
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        IPA_NAME="121jhj.ipa"
        zip -qr "packages/$IPA_NAME" Payload
        echo "✓ 生成 IPA: packages/$IPA_NAME"
        ls -la packages/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 121jhj-package
        path: packages/*.ipa
        if-no-files-found: warn
