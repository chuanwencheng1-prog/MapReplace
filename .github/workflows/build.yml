name: Build iOS Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install Theos Dependencies
      run: |
        brew install ldid xz

    - name: Install Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: Install iOS SDK
      run: |
        export THEOS=~/theos
        cd $THEOS/sdks
        curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz --strip-components=1

    - name: Clean Build Cache
      run: |
        export THEOS=~/theos
        make clean || true
        rm -rf .theos/ || true

    - name: Build IPA
      run: |
        export THEOS=~/theos
        echo "===== 开始编译 (application) ====="
        make package FINALPACKAGE=1 2>&1 || {
          echo "===== 编译失败，显示错误信息 ====="
          cat *.log 2>/dev/null || true
          exit 1
        }
        echo "===== 编译完成，检查产物 ====="
        ls -la packages/ 2>/dev/null || echo "packages 目录不存在"
        find packages/ -name "*.ipa" 2>/dev/null || echo "未找到 .ipa 文件"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Map-package
        path: packages/*.ipa
        if-no-files-found: warn
